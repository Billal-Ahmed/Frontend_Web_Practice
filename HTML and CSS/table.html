<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            text-align: left;
            border: 1px solid #ddd;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
            <th>Country</th>
        </tr>
        </thead>

     <tbody>
           <tr>
            <td>Alice</td>
            <td>30</td>
            <td>New York</td>
            <td>USA</td>
        </tr>
        <tr>
            <td rowspan="2">Bob</td>
            <td>25</td>
            <td>Los Angeles</td>
            <td>USA</td>
        </tr>
        <tr>
            <!-- <td>Charlie</td> -->
            <td>35</td>
            <td colspan="2">Chicago</td>
            <!-- <td>USA</td> -->
        </tr>
        <tr>
            <td>Diana</td>
            <td>28</td>
            <td>Miami</td>
            <td>USA</td>
        </tr>
     </tbody>

    </table>


</body>
</html>
