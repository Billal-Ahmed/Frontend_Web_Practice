<!DOCTYPE html>
<html>
<head>
  <title>Beautiful Design</title>
  <!-- <link rel="stylesheet" href="style.css">
    -->
  <style>
    /* Global Styles */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background-color: #f0f0f0;
}

/* Card Container */
.card-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.card {
  background-color: #fff;
  width: 300px;
  height: 400px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  transition: transform 0.5s;
}

.card:hover {
  transform: scale(1.1) rotate(5deg);
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
}

/* Image */
.image {
  width: 100%;
  height: 200px;
  border-top-left-radius: 10px;
  border-top-right-radius: 10px;
  background-image: url('https://picsum.photos/300/200');
  background-size: cover;
  background-position: center;
  transition: transform 0.5s;
}

.card:hover .image {
  transform: scale(1.1);
}

/* Content */
.content {
  padding: 20px;
}

.content h2 {
  font-size: 24px;
  margin-bottom: 10px;
  animation: fadeIn 2s;
}

.content p {
  font-size: 16px;
  color: #666;
  animation: fadeIn 3s;
}

/* Button */
.button {
  background-color: #4CAF50;
  color: #fff;
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.5s;
}

.button:hover {
  background-color: #3e8e41;
  animation: pulse 1s;
}

/* Animations */
@keyframes fadeIn {
  0% {
    opacity: 0;
  }
  100% {
    opacity: 1;
  }
}

@keyframes pulse {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.1);
  }
  100% {
    transform: scale(1);
  }
}
  </style>
</head>
<body>
  <div class="card-container">
    <div class="card">
      <div class="image"></div>
      <div class="content">
        <h2>Card Title</h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed sit amet nulla auctor, vestibulum magna sed, convallis ex.</p>
        <button class="button">Learn More</button>
      </div>
    </div>
  </div>
</body>
</html>
