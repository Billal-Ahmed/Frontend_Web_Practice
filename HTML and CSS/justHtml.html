<!DOCTYPE html>
<html>
<head>
	<title>Beginner HTML Example</title>
</head>
<body>

	<!-- Heading Tags -->
	<h1>Welcome to HTML</h1>
	<h2>Learning HTML is Fun!</h2>
	<h3>Let's Get Started!</h3>

	<!-- Link Tag -->
	<p>Visit <a href="https://www.w3schools.com/html/">W3Schools</a> for more HTML tutorials.</p>

	<!-- Table Tag -->
	<table border="1">
		<tr>
			<th>Student Name</th>
			<th>Age</th>
			<th>Grade</th>
		</tr>
		<tr>
			<td>John Doe</td>
			<td>15</td>
			<td>A</td>
		</tr>
		<tr>
			<td>Jane Smith</td>
			<td>16</td>
			<td>B</td>
		</tr>
	</table>

	<!-- Image Tag -->
	<img src="https://picsum.photos/200/300" alt="Random Image">

	<!-- List Tags -->
	<ul>
		<li>Item 1</li>
		<li>Item 2</li>
		<li>Item 3</li>
	</ul>

	<ol>
		<li>First Item</li>
		<li>Second Item</li>
		<li>Third Item</li>
	</ol>

	<!-- Paragraph Tag -->
	<p>This is a paragraph of text.</p>

</body>
</html>
