<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f0f0f0;
}

.container {
    max-width: 400px;
    margin: 50px auto;
    padding: 20px;
    background-color: #fff;
    border: 1px solid #ddd;
    border-radius: 5px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

.facebook-logo {
    text-align: center;
    margin-bottom: 20px;
}

.facebook-logo img {
    width: 100px;
    height: 100px;
}

.login-form {
    padding: 20px;
}

.login-form input[type="email"],
.login-form input[type="password"] {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.login-form button[type="submit"] {
    width: 100%;
    padding: 10px;
    background-color: #1877f2;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.login-form button[type="submit"]:hover {
    background-color: #166fe5;
}

.forgot-password {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #1877f2;
    text-decoration: none;
}

.signup-link {
    margin-top: 20px;
    text-align: center;
}

.signup-link a {
    color: #1877f2;
    text-decoration: none;
}

footer {
    margin-top: 50px;
    padding: 20px;
    background-color: #fff;
    border-top: 1px solid #ddd;
}

.footer-links {
    text-align: center;
    margin-bottom: 10px;
}

.footer-links a {
    margin-right: 10px;
    color: #1877f2;
    text-decoration: none;
}

.copyright {
    text-align: center;
    color: #666;
}

/* Responsive styles */
@media (max-width: 768px) {
    .container {
        margin: 20px auto;
    }
}

@media (max-width: 480px) {
    .container {
        padding: 10px;
    }
    .login-form {
        padding: 10px;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <div class="facebook-logo">
            <img src="https://www.facebook.com/images/fb_icon_325x325.png" alt="Facebook Logo">
        </div>
        <div class="login-form">
            <form>
                <input type="email" placeholder="Email or Phone Number" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Log In</button>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </form>
            <div class="signup-link">
                <p>Don't have an account? <a href="#">Sign Up</a></p>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#">English (UK)</a>
            <a href="#">हिन्दी</a>
            <a href="#">বাংলা</a>
            <a href="#">తెలుగు</a>
            <a href="#">मराठी</a>
        </div>
        <div class="copyright">
            <p>&copy; 2023 Facebook</p>
        </div>
    </footer>
</body>
</html>
