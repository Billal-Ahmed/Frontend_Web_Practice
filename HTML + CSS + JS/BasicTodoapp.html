<!DOCTYPE html>
<html>
<head>
  <title>To-Do List</title>
  <style>
    #todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #todo-list li {
      padding: 10px;
      border-bottom: 1px solid #ccc;
    }

    #todo-list li:last-child {
      border-bottom: none;
    }

    .delete-btn, .edit-btn {
      float: right;
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <h1>To-Do List</h1>
  <form id="todo-form">
    <input id="todo-input" type="text" placeholder="Enter a todo item">
    <button type="submit">Add</button>
  </form>
  <ul id="todo-list"></ul>

  <script>
// Get the elements
const todoForm = document.getElementById('todo-form');
const todoInput = document.getElementById('todo-input');
const todoList = document.getElementById('todo-list');

// Function to add a todo item
function addTodoItem(todoText) {
  const todoItem = document.createElement('li');
  todoItem.textContent = todoText;
  todoItem.innerHTML = `
    <span>${todoText}</span>
    <button class="delete-btn">Delete</button>
    <button class="edit-btn">Edit</button>
  `;

  // Add event listeners to the buttons
  todoItem.querySelector('.delete-btn').addEventListener('click', () => {
    deleteTodoItem(todoItem);
  });

  todoItem.querySelector('.edit-btn').addEventListener('click', () => {
    editTodoItem(todoItem);
  });

  todoList.appendChild(todoItem);
}

// Function to delete a todo item
function deleteTodoItem(todoItem) {
  todoItem.remove();
}

// Function to edit a todo item
function editTodoItem(todoItem) {
  const newText = prompt('Enter new text:');
  if (newText) {
    todoItem.querySelector('span').textContent = newText;
  }
}

// Event listener for the form submission
todoForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const todoText = todoInput.value.trim();
  if (todoText) {
    addTodoItem(todoText);
    todoInput.value = '';
  }
});

// Add some initial todo items
addTodoItem('Buy milk');
addTodoItem('Walk the dog');
addTodoItem('Do homework');

  </script>
</body>
</html>
